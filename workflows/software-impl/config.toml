poll_interval_secs = 60

[[triggers]]
type = "github_issue_assigned"
assigned_to = "your-github-username"
allowed_issue_creators = ["your-github-username"]

[[repos]]
owner = "your-org"
repo = "your-repo"

# Workflow steps executed sequentially for each triggered issue.
# Template placeholders: {{owner}}, {{repo}}, {{issue_number}}, {{output_path}}
# {{output_path}} resolves to data/<owner>/<repo>/<issue_number>/ — created
# before the first step runs. Steps write their own files into that directory.

[[steps]]
name = "Plan"
prompt_template = "Read GitHub issue #{{issue_number}} in {{owner}}/{{repo}}. Use the triage-summary skill and write the result to {{output_path}}/plan.md."
harness = { type = "hermes", profile = "pm" }

[[steps]]
name = "Implement"
prompt_template = "Implement the plan at {{output_path}}/plan.md using the subagent-driven-development skill. Write a summary of what you did to {{output_path}}/implementation.md."
harness = { type = "hermes", profile = "swe", worktree = true }

[[steps]]
name = "Review"
prompt_template = "Use the requesting-code-review skill to produce {{output_path}}/review.md."
harness = { type = "hermes", profile = "swe" }

[[steps]]
name = "Remedy"
prompt_template = "Use the receiving-code-review skill to address the review in {{output_path}}/review.md. Update {{output_path}}/implementation.md to reflect the changes you have made."
harness = { type = "hermes", profile = "swe" }

[[steps]]
name = "Finalize"
prompt_template = "Use the finalize-task skill."
harness = { type = "hermes", profile = "pm" }