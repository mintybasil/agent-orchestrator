poll_interval_secs = 60

repos = [
    {owner = "zerokrab", repo = "bento-hancho"},
    {owner = "zerokrab", repo = "bento-bench"},
    {owner = "zerokrab", repo = "boundless-profit-explorer"},
    {owner = "zerokrab", repo = "bento-bench-autorun"},
    {owner = "mintybasil", repo = "agent-orchestrator"},
    {owner = "mintybasil", repo = "mintybasil.dev"},
    {owner = "mintybasil", repo = "agent-vms-ansible"},
]

[git]
clone = true
worktree = true
default_branch = "main"

[[triggers]]
type = "github_pr_review"
allowed_users = ["mintybasil"]

[[steps]]
name = "Address Review"
prompt_template = """
A review has been made on PR #{{pr_number}} in {{owner}}/{{repo}} that you need to respond to.

First you should evaluate the review. DO NOT assume it to be correct, validate any claims it makes.

You must respond by either:
1) Implementing and pushing changes to address the review, and responding with a comment
2) Respond with a comment rebutting the review, or requesting additional feedback or context.

If the review has multiple parts you may do a combination of 1 and 2 if needed.

If you push any changes, please ensure the PR description is updated accordingly.
"""
harness = { type = "hermes", profile = "swe", worktree = true }
