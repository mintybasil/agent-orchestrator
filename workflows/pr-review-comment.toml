repos = [
    {owner = "zerokrab", repo = "bento-hancho"},
    {owner = "zerokrab", repo = "bento-bench"},
    {owner = "zerokrab", repo = "boundless-profit-explorer"},
    {owner = "zerokrab", repo = "bento-bench-autorun"},
    {owner = "mintybasil", repo = "agent-orchestrator"},
    {owner = "mintybasil", repo = "mintybasil.dev"},
    {owner = "mintybasil", repo = "agent-vms-ansible"},
    {owner = "mintybasil", repo = "gha-runners"},
    {owner = "mintybasil", repo = "enginedj-overlay"},
]

[git]
clone = true
worktree = true
default_branch = "main"

[[triggers]]
type = "github_pr_review"
allowed_users = ["mintybasil"]

[[steps]]
name = "Address Review"
prompt_template = """
We need to address review {{review_id}} on PR {{pr_number}} in {{owner}}/{{repo}}. Please complete the following steps:

1. First you must react with "eyes" to the review comment using the GitHub reactions API endpoint.
2. Examine the PR description, and any other comments/reviews that have been left to get complete context.
3. Analyze the review, DO NOT assume it to be correct, validate any claims it makes.
4. If you have sufficient context to address the review: implement and push changes, and respond with a comment. If you need feedback or additional context: add a comment to the PR requesting it.
5. If you have pushed any changes, please ensure the PR description is updated accordingly, that the CI checks pass, and that there are no merge conflicts.
"""
harness = { type = "hermes_api", base_url = "http://localhost:8644" }