poll_interval_secs = 60

repos = [
    {owner = "zerokrab", repo = "bento-hancho"},
    {owner = "zerokrab", repo = "bento-bench"},
    {owner = "zerokrab", repo = "boundless-profit-explorer"},
    {owner = "mintybasil", repo = "agent-orchestrator"},
]

[git]
clone = true
worktree = true
default_branch = "main"

[[triggers]]
type = "github_pr_review"
allowed_users = ["mintybasil"]

[[steps]]
name = "Address Review"
prompt_template = "A comment or review has been made on PR #{{pr_number}} in {{owner}}/{{repo}}. Please review and address it. DO NOT assume it to be correct, validate any claims it makes. If it makes invalid claims, add a comment to explain this. If the claims are valid, push changes to the PR branch to address them."
harness = { type = "hermes", profile = "swe", worktree = true }
