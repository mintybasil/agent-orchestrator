poll_interval_secs = 60

repos = [
    {owner = "zerokrab", repo = "bento-hancho"},
    {owner = "zerokrab", repo = "bento-bench"},
    {owner = "zerokrab", repo = "boundless-profit-explorer"},
    {owner = "zerokrab", repo = "bento-bench-autorun"},
    {owner = "mintybasil", repo = "agent-orchestrator"},
    {owner = "mintybasil", repo = "mintybasil.dev"},
    {owner = "mintybasil", repo = "agent-vms-ansible"},
]

[git]
clone = true
worktree = true
default_branch = "main"

[[triggers]]
type = "github_pr_review"
allowed_users = ["mintybasil"]

[[steps]]
name = "Address Review"
prompt_template = "A review has been made on PR #{{pr_number}} in {{owner}}/{{repo}}. Please evaluate it, check if it's a comment/requested changes/approve, and respond accordingly. DO NOT assume it to be correct, validate any claims it makes. If it makes invalid claims, add a comment to explain this. If the claims are valid, push changes to the PR branch to address them. If you make any changes, please ensure the PR description is updated accordingly."
harness = { type = "hermes", profile = "swe", worktree = true }
