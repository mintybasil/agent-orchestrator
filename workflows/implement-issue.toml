repos = [
    {owner = "zerokrab", repo = "bento-hancho"},
    {owner = "zerokrab", repo = "bento-bench"},
    {owner = "zerokrab", repo = "boundless-profit-explorer"},
    {owner = "zerokrab", repo = "bento-bench-autorun"},
    {owner = "mintybasil", repo = "agent-orchestrator"},
    {owner = "mintybasil", repo = "mintybasil.dev"},
    {owner = "mintybasil", repo = "agent-vms-ansible"},
    {owner = "mintybasil", repo = "gha-runners"},
    {owner = "mintybasil", repo = "enginedj-overlay"},
]

[git]
clone = true
worktree = true
default_branch = "main"

[[triggers]]
type = "github_issue_assigned"
assigned_to = "zeroklaw"
allowed_users = ["mintybasil", "zeroklaw"]

# Workflow steps executed sequentially for each assigned issue.
# Template placeholders: {{owner}}, {{repo}}, {{issue_number}}, {{output_path}}, {{default_branch}}, {{repo_path}}, {{step_N_output}}

[[steps]]
name = "Plan"
prompt_template = "Read GitHub issue #{{issue_number}} in {{owner}}/{{repo}}. Use the writing-plans skill, and store the plan in {{output_path}}/plan.md."
harness = { type = "hermes_api", base_url = "http://localhost:8643" }

[[steps.post_hooks]]
type = "file_not_empty"
path = "{{output_path}}/plan.md"

[[steps]]
name = "Implement"
prompt_template = """
Please complete the following steps:

1. Read the plan in {{output_path}}/plan.md and review the corresponding issue #{{issue_number}} in {{owner}}/{{repo}}.
2. Implement the plan in your workspace. Push your changes to a new branch (zeroklaw/<branch-name>).
3. Run the tests and linters locally and fix any issues. Make sure to update docuentation (README.md, AGENTS.md, etc) as needed.
4. Open a draft PR, and make sure to include "Closes #{{issue_number}}" somewhere in the PR description.
5. Ensure that all CI checks are passing. Wait until all checks complete, do not exit if they are still running. Fix any issues they uncover.
6. Check for merge conflicts. Update the PR to resolve them if needed.
6. Update the PR description if any changes are required.
7. Convert the PR from a draft to a ready for review PR, and request a review from @mintybasil.
"""
harness = { type = "hermes_api", base_url = "http://localhost:8644" }

