poll_interval_secs = 60

[[triggers]]
type = "github_issue_assigned"
assigned_to = "zeroklaw"
allowed_issue_creators = ["mintybasil", "zeroklaw"]

[[repos]]
owner = "zerokrab"
repo = "bento-hancho"

[[repos]]
owner = "zerokrab"
repo = "bento-bench"

# Workflow steps executed sequentially for each assigned issue.
# Template placeholders: {{owner}}, {{repo}}, {{issue_number}}, {{output_path}}, {{step_N_output}}

[[steps]]
name = "Plan"
prompt_template = "Read GitHub issue #{{issue_number}} in {{owner}}/{{repo}}. Use the writing-plans skill, and store the plan in {{output_path}}/plan.md."
harness = { type = "hermes", profile = "pm" }

[[steps.post_hooks]]
type = "file_not_empty"
path = "{{output_path}}/plan.md"

[[steps]]
name = "Implement"
prompt_template = "We have a plan in {{output_path}}/plan.md to address issue #{{issue_number}} in {{owner}}/{{repo}}. Use the executing-plans skill to implement the plan. Push your changes to a new branch (zeroklaw/<branch-name>) and open a PR. Once the PR is open, check that the CI passes. If it fails, fix it."
harness = { type = "hermes", profile = "swe", worktree = true }

